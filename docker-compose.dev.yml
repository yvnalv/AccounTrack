# Accountrack — LOCAL DEVELOPMENT stack. Runs the whole app in Docker on localhost, isolated from
# your host PostgreSQL (stays on :5432) and your dev servers (:5080 / :5173). Its own PostgreSQL
# container is published on :5433 so you can inspect it without clashing with a host install.
#
#   1. cp .env.example .env   (or use the .env already created for you) and set the credentials
#   2. docker compose -f docker-compose.dev.yml up -d --build
#
#   SPA  → http://localhost:8090
#   API  → http://localhost:8081        (Swagger at http://localhost:8081/swagger)
#   PG   → localhost:5433   user: $POSTGRES_USER / $POSTGRES_PASSWORD   (for psql / pgAdmin / DBeaver)
#
#   Stop:  docker compose -f docker-compose.dev.yml down          (keeps the DB volume)
#   Reset: docker compose -f docker-compose.dev.yml down -v       (wipes the DB volume)
name: accountrack-dev

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Accountrack}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - devdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development    # Swagger + verbose logs; env vars below still win
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-Accountrack};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-signing-key-change-me-please-32chars}
      Jwt__Issuer: Accountrack
      Jwt__Audience: Accountrack
      Database__Initialize: "true"
      Database__AutoMigrate: "true"
      Seed__Enabled: "true"
      Seed__AdminEmail: ${ADMIN_EMAIL:-admin@accountrack.local}
      Seed__AdminPassword: ${ADMIN_PASSWORD:-ChangeMe!123}
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:8090:80"
    depends_on:
      - api

volumes:
  devdata:
