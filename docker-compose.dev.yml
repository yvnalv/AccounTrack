# Accountrack — LOCAL DEVELOPMENT stack. Runs the whole app in Docker on localhost, isolated from
# your host SQL Server (stays on :1433) and your dev servers (:5080 / :5173). Its own SQL Server
# container avoids the Windows-auth issue (your dev connection uses Trusted_Connection, which a Linux
# container can't use).
#
#   1. cp .env.example .env   (or use the .env already created for you) and set the credentials
#   2. docker compose -f docker-compose.dev.yml up -d --build
#
#   SPA  → http://localhost:8090
#   API  → http://localhost:8081        (Swagger at http://localhost:8081/swagger)
#   SQL  → localhost,1434   user: sa / MSSQL_SA_PASSWORD   (for SSMS / Azure Data Studio)
#
#   Stop:  docker compose -f docker-compose.dev.yml down          (keeps the DB volume)
#   Reset: docker compose -f docker-compose.dev.yml down -v       (wipes the DB volume)
name: accountrack-dev

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}
      MSSQL_PID: Developer
      MSSQL_MEMORY_LIMIT_MB: "2048"
    ports:
      - "127.0.0.1:1434:1433"
    volumes:
      - devdata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development    # Swagger + verbose logs; env vars below still win
      ConnectionStrings__Default: "Server=db;Database=Accountrack;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-signing-key-change-me-please-32chars}
      Jwt__Issuer: Accountrack
      Jwt__Audience: Accountrack
      Database__Initialize: "true"
      Database__AutoMigrate: "true"
      Seed__Enabled: "true"
      Seed__AdminEmail: ${ADMIN_EMAIL:-admin@accountrack.local}
      Seed__AdminPassword: ${ADMIN_PASSWORD:-ChangeMe!123}
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:8090:80"
    depends_on:
      - api

volumes:
  devdata:
