name: Deploy

# Manual, one-click production deploy (DEPLOYMENT.md §CI/CD):
#   1. Build the API + SPA images and push them to GitHub Container Registry (GHCR).
#   2. SSH into the VPS and `docker compose pull && up -d` the two Accountrack services.
# The VPS builds nothing — it just pulls ready images (protects the RAM-tight box).
# EF migrations apply automatically when the API container restarts (Database__AutoMigrate=true).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build & deploy (e.g. latest, or v1.2.0)"
        default: latest
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}   # lowercase GitHub owner, e.g. yvnalv

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/accountrack-api:${{ inputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/accountrack-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/accountrack-web:${{ inputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/accountrack-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    # Optional: add required reviewers to the "production" environment in repo settings
    # for a manual approval gate before this job runs.
    environment: production
    steps:
      - name: Pull & restart on the VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            # ACCOUNTRACK_TAG lets the compose file pin which image tag to run (defaults to latest).
            export ACCOUNTRACK_TAG="${{ inputs.tag }}"
            docker compose pull accountrack-api accountrack-web
            docker compose up -d accountrack-api accountrack-web
            docker image prune -f
