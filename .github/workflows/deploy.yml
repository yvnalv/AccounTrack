name: Deploy

# Auto-deploy (DEPLOYMENT.md §5): on every push to main — run the tests, then build the API + SPA
# images, push them to GHCR, and SSH into the VPS to `docker compose pull && up -d`. The VPS builds
# nothing; it pulls ready images. EF migrations apply when the API container restarts.
#
# Also runnable manually (Actions → Deploy → Run workflow) with a chosen image `tag` — e.g. to roll
# back by re-deploying a previous tag/SHA.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build & deploy (e.g. latest, or v1.2.0)"
        default: latest
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}                 # lowercase GitHub owner, e.g. yvnalv
  TAG: ${{ github.event.inputs.tag || 'latest' }}       # manual run → chosen tag; push → "latest"

jobs:
  # Gate: broken code never reaches the VPS. Same reusable suite CI runs on PRs.
  test:
    uses: ./.github/workflows/test.yml

  build-push:
    name: Build & push images to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/accountrack-api:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/accountrack-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/accountrack-web:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/accountrack-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    # Optional: add required reviewers to the "production" environment in repo settings for a manual
    # approval click before this job runs (turns auto-deploy into approve-then-deploy).
    environment: production
    steps:
      - name: Pull & restart on the VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            # ACCOUNTRACK_TAG pins which image tag the compose file runs (defaults to latest).
            export ACCOUNTRACK_TAG="${{ env.TAG }}"
            docker compose pull accountrack-api accountrack-web
            docker compose up -d accountrack-api accountrack-web
            docker image prune -f
