name: CI

# Quality gate for proposed changes: runs the reusable Test workflow on every pull request.
# (Pushes to main are handled by deploy.yml, which runs the same tests before it ships.)
on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml
