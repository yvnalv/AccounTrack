name: CI

# Quality gate: build + test the backend and the frontend on every PR and every push to main.
# No deploying happens here — see deploy.yml (manual) for shipping to the VPS.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest

    # A throwaway PostgreSQL so the cross-tenant isolation integration tests actually run
    # (PostgresFixture reads ACCOUNTRACK_TEST_PG; without a server it skips).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ACCOUNTRACK_TEST_PG: "Host=localhost;Port=5432;Username=postgres;Password=postgres"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Accountrack.sln

      - name: Build (Release, warnings-as-errors)
        run: dotnet build Accountrack.sln -c Release --no-restore

      - name: Test
        run: dotnet test Accountrack.sln -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck + build
        run: npm run build   # vue-tsc --noEmit && vite build
