# Accountrack — self-hosted stack: PostgreSQL + API + SPA/Nginx (DEPLOYMENT.md).
# TLS and subdomain routing are handled by YOUR existing reverse proxy in front of this stack;
# only the `web` container publishes a port for that proxy to forward to. Copy .env.example → .env
# and fill it in, then: docker compose up -d --build
#
# NOTE: if your VPS already runs a PostgreSQL container, you can drop the `db` service below and
# instead point the API at it: remove the `db` block + `depends_on`, attach the api to that DB's
# network, and set ConnectionStrings__Default to Host=<that-container>;... The `db` service here
# makes the stack self-contained.
name: accountrack

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Accountrack}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [internal]
    restart: unless-stopped
    # Not published: reachable only on the internal Docker network, never from the public interface.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-Accountrack};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      # Auth — MUST be a strong secret (>= 32 chars). The app refuses to start in Production without it.
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?set JWT_SIGNING_KEY in .env}
      Jwt__Issuer: ${JWT_ISSUER:-Accountrack}
      Jwt__Audience: ${JWT_AUDIENCE:-Accountrack}
      # First boot: create/upgrade all module schemas, then seed the catalog + a working company
      # (chart of accounts, posting rules, PPN 11%, system accounts) and the initial administrator.
      Database__Initialize: "true"
      Database__AutoMigrate: "true"
      Seed__Enabled: ${SEED_ENABLED:-true}
      Seed__AdminEmail: ${ADMIN_EMAIL:?set ADMIN_EMAIL in .env}
      Seed__AdminPassword: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      # Billing / Xendit (SUBSCRIPTION_BILLING.md). Optional — leave the Xendit secrets blank until you
      # wire up payments; checkout returns a clear error while unconfigured. Entitlement enforcement is
      # off by default (dark launch) and only ever restricts tenants that actually hold a subscription.
      Billing__Entitlements__Enforce: ${BILLING_ENFORCE:-false}
      Billing__Xendit__SecretKey: ${XENDIT_SECRET_KEY:-}
      Billing__Xendit__CallbackToken: ${XENDIT_CALLBACK_TOKEN:-}
      Billing__Xendit__SuccessRedirectUrl: ${XENDIT_SUCCESS_URL:-}
      Billing__Xendit__FailureRedirectUrl: ${XENDIT_FAILURE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    depends_on: [api]
    # Publish only the SPA/proxy container; point your external reverse proxy (the one already serving
    # your other subdomains) at http://<host>:${WEB_PORT}. Bind to localhost if the proxy runs on the
    # same host: set WEB_BIND=127.0.0.1 in .env.
    ports:
      - "${WEB_BIND:-0.0.0.0}:${WEB_PORT:-8090}:80"
    networks: [internal]
    restart: unless-stopped

networks:
  internal:

volumes:
  pg-data:
